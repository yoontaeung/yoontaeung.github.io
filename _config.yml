title: Taeung Yoon
description: Personal Homepage
author: Taeung Yoon
avatar: /photo.jpeg
email: yoontaeung@kaist.ac.kr

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-remote-theme

remote_theme: ngzhio/jekyll-theme-hamilton

paginate: 10

# Uncomment the below line and set the tracking ID for enabling Google Analytics
# 
# google_analytics: 

# Uncomment the below lines and set the Disqus shortname for enabling Disqus
# 
# disqus:

# Jekyll
# ======
exclude:
  - vendor/
  - scripts/
  - README.md
  - jekyll-theme-hamilton.gemspec

# Jekyll SEO Tag (Optional)
# =========================
twitter:
  username: yoontaeung
  card: summary
logo: logo.png
social:
  name: Taeung Yoon
  links:
    - https://github.com/yoontaeung
google_site_verification: 
lang: en
